name: tyohaar
description: "Tyohaar — the home for life's celebrations. Customer mobile app UI."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/tyohaar-mark.png
    - assets/images/Landing page image.png
    - assets/images/christmas.png
    - assets/images/birthday banner.png
