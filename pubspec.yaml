name: tyohaar
description: "Tyohaar — the home for life's celebrations. Customer mobile app UI."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  shimmer: ^3.0.0
  razorpay_flutter: ^1.3.7
  image_picker: ^1.2.3
  image_cropper: ^12.2.1
  device_preview: ^1.3.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  gal: ^2.3.1
  permission_handler: ^11.3.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  device_info_plus: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/tyohaar-mark.png
    - assets/images/Landing page image.png
    - assets/images/christmas.png
    - assets/images/birthday banner.png
    - assets/images/baby-shower.png
    - assets/images/birthday party card.png
    - assets/images/Diwali Celebration card.png
    - assets/images/House warminng pooja card.png
    - assets/images/Mehndi Ceremony Card.png
    - assets/images/Graduation party card.png
