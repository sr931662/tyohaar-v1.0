services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tyohaar
      POSTGRES_PASSWORD: tyohaar
      POSTGRES_DB: tyohaar
    ports:
      - "5432:5432"
    volumes:
      - tyohaar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tyohaar"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://tyohaar:tyohaar@db:5432/tyohaar
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  tyohaar_pg_data:
